# Automated PR labeling via actions/labeler
# Triggered by .github/workflows/labeler.yml

parser:
  - changed-files:
      - any-glob-to-any-file:
          - 'pkg/sql/parser/**'

tokenizer:
  - changed-files:
      - any-glob-to-any-file:
          - 'pkg/sql/tokenizer/**'

ast:
  - changed-files:
      - any-glob-to-any-file:
          - 'pkg/sql/ast/**'

security:
  - changed-files:
      - any-glob-to-any-file:
          - 'pkg/sql/security/**'
          - 'cmd/gosqlx/internal/validate/**'

linter:
  - changed-files:
      - any-glob-to-any-file:
          - 'pkg/linter/**'

lsp:
  - changed-files:
      - any-glob-to-any-file:
          - 'pkg/lsp/**'

cli:
  - changed-files:
      - any-glob-to-any-file:
          - 'cmd/gosqlx/**'

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - 'docs/**'
          - '*.md'
          - 'llms.txt'

performance:
  - changed-files:
      - any-glob-to-any-file:
          - 'pkg/metrics/**'
          - 'performance_baselines.json'
          - '**/*_bench_test.go'
          - '**/*benchmark*'

dialects:
  - changed-files:
      - any-glob-to-any-file:
          - 'pkg/sql/keywords/**'

ci-cd:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**'
          - 'Taskfile.yml'
          - '.goreleaser.yml'

python:
  - changed-files:
      - any-glob-to-any-file:
          - 'python/**'
          - 'pkg/cbinding/**'

wasm:
  - changed-files:
      - any-glob-to-any-file:
          - 'wasm/**'

transform:
  - changed-files:
      - any-glob-to-any-file:
          - 'pkg/transform/**'
