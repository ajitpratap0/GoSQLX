name: Lighthouse CI

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
  pull_request:
    paths:
      - 'website/**'
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build WASM
        run: |
          cd wasm && make build
          mkdir -p ../website/public/wasm
          cp playground/gosqlx.wasm ../website/public/wasm/
          cp playground/wasm_exec.js ../website/public/wasm/

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install and build website
        run: |
          cd website
          npm ci
          npm run build

      - name: Start local server
        run: |
          cd website
          npx next start -p 3000 &
          sleep 5

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3000/
            http://localhost:3000/playground
            http://localhost:3000/docs
          configPath: '.github/lighthouse/lighthouserc.json'
          uploadArtifacts: true

      - name: Check scores
        run: |
          echo "Lighthouse audit complete. Check artifacts for detailed results."
