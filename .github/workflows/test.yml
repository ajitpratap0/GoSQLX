name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.26']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Build
      run: go build -v ./...

    - name: Build WASM
      run: GOOS=js GOARCH=wasm go build -o /dev/null ./wasm/

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.26']
    env:
      # Prevent Go from auto-downloading toolchain which conflicts with setup-go cache
      GOTOOLCHAIN: local

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go }}
        cache: true

    - name: Get dependencies
      run: go mod download

    - name: Run tests
      run: go test -v -race -coverprofile coverage.txt -covermode atomic ./pkg/...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.txt
        flags: unittests
        name: codecov-${{ matrix.os }}-${{ matrix.go }}
      continue-on-error: true

  race-check:
    name: Race Detector
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true

    - name: Install Task
      run: go install github.com/go-task/task/v3/cmd/task@latest

    # Use Taskfile so CI matches local `task test:race` (pkg/cbinding excluded -
    # it requires CGO and is exercised separately in the cbinding-race job).
    - name: Run tests with race detector
      run: task test:race

  cbinding-race:
    name: Race Detector (CGO / cbinding)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true

    - name: Install Task
      run: go install github.com/go-task/task/v3/cmd/task@latest

    - name: Run cbinding tests (CGO + race)
      env:
        CGO_ENABLED: '1'
      run: task test:cbinding

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true

    - name: Run benchmarks
      run: |
        go test -run=^$ -bench=. -benchmem -timeout=5m ./pkg/sql/tokenizer/
        go test -run=^$ -bench=. -benchmem -timeout=5m ./pkg/sql/parser/
        go test -run=^$ -bench=. -benchmem -timeout=5m ./pkg/sql/ast/

  perf-regression:
    name: Performance Regression
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true

    - name: Run performance regression tests
      continue-on-error: true
      run: go test -run TestPerformanceRegression -timeout=5m ./pkg/sql/parser/

  fuzz-regression:
    name: Fuzz Regression
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true

    - name: Run fuzz regression (corpus only)
      run: |
        go test -fuzz=FuzzTokenizer -fuzztime=10s -timeout=2m ./pkg/sql/tokenizer/ || true
        go test -fuzz=FuzzScanSQL -fuzztime=10s -timeout=2m ./pkg/sql/security/ || true
