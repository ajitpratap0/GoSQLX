version: "2"

run:
  timeout: 10m
  tests: false

linters:
  enable:
    - ineffassign
    - unused
    - errcheck
    - govet
    - staticcheck
    - misspell
    - gocritic
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Print
        - fmt.Printf
        - fmt.Println
    staticcheck:
      checks:
        - "all"
        - "-QF*"
        - "-ST*"
    gocritic:
      disabled-checks:
        - ifElseChain

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # AlterTableStatement is deprecated in favour of AlterStatement but retained
    # for backward compatibility. Internal usages in type switches and formatter
    # helpers are intentional — suppress SA1019 on these known call sites.
    - linters: [staticcheck]
      text: "ast.AlterTableStatement is deprecated"
