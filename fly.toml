app = "gosqlx-mcp"
primary_region = "iad"

[build]

[env]
  GOSQLX_MCP_HOST = "0.0.0.0"
  GOSQLX_MCP_PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
